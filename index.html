<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APOLO Casino</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0a0f1f, #000);
    color:white;
}

/* GRID FONDO */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.btn {
    background:#ff003c;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    box-shadow:0 0 20px #ff003c;
}

/* LAYOUT */
.container {
    display:flex;
}

/* MAIN */
.main {
    width:70%;
    padding:30px;
}

/* SIDEBAR */
.sidebar {
    width:30%;
    padding:30px;
}

/* BONUS */
.bonus {
    background: linear-gradient(90deg,#4b0000,#1a1f4d);
    padding:20px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

/* HERO */
.hero {
    text-align:center;
    margin:60px 0;
}

.hero h1 {
    font-size:50px;
}

/* CARDS */
.carousel {
    display:flex;
    gap:20px;
    overflow-x:auto;
}

.card {
    min-width:240px;
    border-radius:15px;
    overflow:hidden;
    background:#0c142b;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px #ff003c;
}

.card-top {
    height:120px;
}

/* GRADIENTES */
.slots {background:linear-gradient(45deg,purple,pink);}
.ruleta {background:linear-gradient(45deg,red,orange);}
.poker {background:linear-gradient(45deg,blue,cyan);}
.blackjack {background:linear-gradient(45deg,green,teal);}

.card-content {
    padding:15px;
}

/* SIDEBAR PANEL */
.panel {
    background:#0c142b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.profile {
    text-align:center;
}

.profile img {
    width:80px;
    border-radius:50%;
    border:2px solid #ff003c;
}

.progress {
    height:8px;
    background:#222;
    border-radius:10px;
    margin:10px 0;
}

.bar {
    height:100%;
    width:65%;
    background:linear-gradient(gold,orange);
}

.balance {
    font-size:24px;
    color:#4da6ff;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container {flex-direction:column;}
    .main, .sidebar {width:100%;}
}
</style>

</head>

<body>

<header>
    <h2>APOLO</h2>
    <div>
        <button class="btn">Ingresar</button>
        <button class="btn">Registrarse</button>
    </div>
</header>

<div class="container">

<div class="main">

<div class="bonus">
    <div>
        <h3>Bono de Bienvenida</h3>
        <p>Duplica tu primer depósito hasta $100,000 COP</p>
    </div>
    <button class="btn">Reclamar</button>
</div>

<section class="hero">
    <h1>Bienvenido a APOLO</h1>
    <p>La experiencia de casino más futurista del universo</p>
</section>

<h2>Categorías de Juegos</h2>

<div class="carousel">

<div class="card">
<div class="card-top slots"></div>
<div class="card-content">
<h3>Slots</h3>
<p>Máquinas espaciales</p>
<button class="btn">Jugar</button>
</div>
</div>

<div class="card">
<div class="card-top ruleta"></div>
<div class="card-content">
<h3>Ruleta</h3>
<p>Clásica</p>
<button class="btn">Jugar</button>
</div>
</div>

<div class="card">
<div class="card-top poker"></div>
<div class="card-content">
<h3>Poker</h3>
<button class="btn">Jugar</button>
</div>
</div>

</div>

</div>

<div class="sidebar">

<div class="panel profile">
<h3>Perfil</h3>
<img src="https://i.pravatar.cc/150">
<p>Nivel: Bronce</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="balance">$50,000 COP</div>

<button class="btn">Mi Billetera</button>
</div>

</div>

</div>

</body>
</html>
